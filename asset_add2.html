<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tambah Rekod Asset EMT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">

        <!-- PAGE HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
            <h4 class="mb-0">Tambah Rekod Asset EMT</h4>
            <small class="text-muted">
                Rekod asset dan peralatan EMT
            </small>
            </div>

            <div class="mb-3 d-flex justify-content-end">
            <a href="asset_all.html" class="btn btn-primary">
                <i class="bi bi-arrow-left me-1"></i> Kembali
            </a>
            </div>

        </div>

        <!-- FORM CARD -->
        <div class="card shadow-sm">

            <div class="card-header bg-white">
            <strong>Maklumat Asset EMT</strong>
            </div>

            <div class="card-body">

                <form>

                <div class="row g-3">

                    <!-- ASSET NAME -->
                    <div class="col-md-6">
                    <label class="form-label">Nama Aset</label>
                    <input type="text" class="form-control"
                            placeholder="Contoh: Oxygen Cylinder / Generator / Defibrillator">
                    </div>

                    <!-- KUANTITI ASET -->
                    <div class="col-md-3">
                        <label class="form-label">Kuantiti Aset</label>
                        <input type="number"
                            class="form-control"
                            min="1"
                            step="1"
                            placeholder="Contoh: 1">
                    </div>

                    <!-- SERIAL NUMBER -->
                    <div class="col-md-3">
                    <label class="form-label">No Siri</label>
                    <input type="text" class="form-control"
                            placeholder="SN-2026-XXXX">
                    </div>

                    <!-- CATEGORY -->
                    <div class="col-md-4">
                    <label class="form-label">Kategori</label>
                    <select class="form-select">
                        <option selected disabled>Pilih</option>
                        <option>Perubatan</option>
                        <option>Elektrik</option>
                        <option>Logistik</option>
                        <option>Komunikasi</option>
                        <option>IT / Sistem</option>
                        <option>Lain-lain</option>
                    </select>
                    </div>

                    <!-- SUB CATEGORY -->
                    <div class="col-md-4">
                    <label class="form-label">Sub Kategori</label>
                    <input type="text" class="form-control"
                            placeholder="Contoh: Oxygen / ICU / Portable">
                    </div>

                    <!-- JENIS -->
                    <div class="col-md-4">
                    <label class="form-label">Jenis Aset</label>
                    <select class="form-select">
                        <option selected disabled>Pilih</option>
                        <option>Boleh Habis Guna (Consumable)</option>
                        <option>Peralatan (Equipment)</option>
                        <option>Sokongan Kenderaan</option>
                        <option>Peranti ICT</option>
                    </select>
                    </div>

                    <!-- PROCUREMENT INFO -->
                    <div class="col-12 mt-3">
                    <h6 class="fw-bold text-muted">Maklumat Perolehan</h6>
                    <hr class="mt-1">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Tarikh Perolehan</label>
                    <input type="date" class="form-control">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Kos Perolehan (RM) Per Unit</label>
                    <input type="number" class="form-control" placeholder="0.00">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Pembekal</label>
                    <input type="text" class="form-control"
                            placeholder="Nama vendor / syarikat">
                    </div>

                    <!-- CONDITION & STATUS -->
                    <div class="col-12 mt-3">
                    <h6 class="fw-bold text-muted">Status & Keadaan Aset</h6>
                    <hr class="mt-1">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Status Aset</label>
                    <select class="form-select">
                        <option>Tersedia</option>
                        <option>Digunakan</option>
                        <option>Penyelenggaraan</option>
                        <option>Rosak</option>
                        <option>Hilang / Lupus</option>
                    </select>
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Keadaan Fizikal</label>
                    <select class="form-select">
                        <option>Baik</option>
                        <option>Memuaskan</option>
                        <option>Perlu Baik Pulih</option>
                        <option>Rosak</option>
                    </select>
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Tahap Kritikal</label>
                    <select class="form-select">
                        <option>Rendah</option>
                        <option>Sederhana</option>
                        <option>Tinggi</option>
                    </select>
                    </div>

                    <!-- LOCATION -->
                    <div class="col-12 mt-3">
                    <h6 class="fw-bold text-muted">Lokasi & Pemilikan</h6>
                    <hr class="mt-1">
                    </div>

                    <div class="col-md-6">
                    <label class="form-label">Lokasi Semasa</label>
                    <input type="text" class="form-control"
                            placeholder="Warehouse / Hospital / Unit EMT / Negeri">
                    </div>

                    <div class="col-md-6">
                    <label class="form-label">Pegawai Bertanggungjawab</label>
                    <input type="text" class="form-control"
                            placeholder="Nama pegawai / unit">
                    </div>

                    <!-- MAINTENANCE -->
                    <div class="col-12 mt-3">
                    <h6 class="fw-bold text-muted">Penyelenggaraan</h6>
                    <hr class="mt-1">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Tarikh Servis Terakhir</label>
                    <input type="date" class="form-control">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Tarikh Servis Seterusnya</label>
                    <input type="date" class="form-control">
                    </div>

                    <div class="col-md-4">
                    <label class="form-label">Warranty Tamat</label>
                    <input type="date" class="form-control">
                    </div>

                    <!-- ADDITIONAL -->
                    <div class="col-12 mt-3">
                    <h6 class="fw-bold text-muted">Maklumat Tambahan</h6>
                    <hr class="mt-1">
                    </div>

                    <div class="col-md-6">
                    <label class="form-label">Catatan</label>
                    <textarea class="form-control" rows="3"
                                placeholder="Maklumat tambahan aset"></textarea>
                    </div>

                    <div class="col-md-6">
                    <label class="form-label">Dokumen Sokongan</label>
                    <input type="file" class="form-control">
                    <small class="text-muted">Invoice / warranty / gambar aset</small>
                    </div>

                </div>

                <!-- SUBMIT -->
                <div class="d-flex justify-content-end mt-4">
                    <button type="submit"
                            class="btn btn-primary px-4 rounded-pill shadow-sm">
                    Simpan Aset
                    </button>
                </div>

                </form>

            </div>

        </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
