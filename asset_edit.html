<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASSET EDIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">

    <!-- PAGE HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
        <h4 class="mb-0">Kemaskini Rekod Asset EMT</h4>
        <small class="text-muted">
            Kemas kini maklumat asset dan peralatan EMT
        </small>
        </div>

        <div class="mb-3 d-flex justify-content-end">
        <a href="mission_detail.html" class="btn btn-primary">
            <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>
        </div>

    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm border-0">

        <div class="card-header bg-white">
        <strong>Kemaskini Asset EMT</strong>
        </div>

        <div class="card-body">

        <form>

            <div class="row g-3">

            <!-- EMT NAME (READ ONLY) -->
            <div class="col-md-6">
                <label class="form-label">Nama EMT</label>
                <input type="text"
                    class="form-control bg-light"
                    value="EMT Operasi Banjir Sabah"
                    readonly>
                <small class="text-muted">Data misi tidak boleh diubah</small>
            </div>

            <!-- ASSET NAME -->
            <div class="col-md-6">
                <label class="form-label">Nama Asset</label>
                <input type="text"
                    class="form-control"
                    value="Oxygen Cylinder">
            </div>

            <!-- CATEGORY -->
            <div class="col-md-4">
                <label class="form-label">Kategori</label>
                <select class="form-select">
                <option>Electrical</option>
                <option selected>Medical</option>
                <option>Logistics</option>
                <option>Communication</option>
                </select>
            </div>

            <!-- QUANTITY -->
            <div class="col-md-4">
                <label class="form-label">Kuantiti</label>
                <input type="number"
                    class="form-control"
                    value="10"
                    min="0">
            </div>

            <!-- SERIAL NUMBER -->
            <div class="col-md-4">
                <label class="form-label">No Siri / Serial Number</label>
                <input type="text"
                    class="form-control"
                    value="SN-2026-OXY-8891">
            </div>

            <!-- PRODUCTION DATE -->
            <div class="col-md-4">
                <label class="form-label">Tarikh Dikeluarkan</label>
                <input type="date"
                    class="form-control"
                    value="2026-01-10">
            </div>

            <!-- EXPIRY DATE -->
            <div class="col-md-4">
                <label class="form-label">Tarikh Luput</label>
                <input type="date"
                    class="form-control"
                    value="2029-01-10">
                <small class="text-muted">
                Untuk consumable / peralatan tertentu sahaja
                </small>
            </div>

            <!-- STATUS -->
            <div class="col-md-4">
                <label class="form-label">Status Asset</label>
                <select class="form-select">
                <option>Available</option>
                <option selected>In Use</option>
                <option>Maintenance</option>
                <option>Damaged</option>
                </select>
            </div>

            <!-- LOCATION -->
            <div class="col-md-6">
                <label class="form-label">Lokasi</label>
                <input type="text"
                    class="form-control"
                    value="Warehouse - Sabah Ops">
            </div>

            <!-- NOTES -->
            <div class="col-md-6">
                <label class="form-label">Catatan</label>
                <textarea class="form-control" rows="2">Digunakan untuk bantuan pernafasan pesakit di kawasan banjir.</textarea>
            </div>

            </div>

            <!-- BUTTONS -->
            <div class="d-flex justify-content-end gap-2 mt-4">

            <a href="mission_detail.html"
                class="btn btn-outline-secondary rounded-pill shadow-sm px-4">
                Batal
            </a>

            <button type="submit"
                    class="btn btn-primary rounded-pill shadow-sm px-4">

                <i class="bi bi-check-circle me-1"></i>
                Simpan Perubahan

            </button>

            </div>

        </form>

        </div>

    </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
