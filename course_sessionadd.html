<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tambah Sesi Kursus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">

        <!-- PAGE HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-0">Tambah Sesi B-Course & C-Course</h4>
                <small class="text-muted">
                    Tambah sesi baharu B-Course & C-Course MyEMT
                </small>
            </div>

            <a href="course_management.html" class="btn btn-primary">
                <i class="bi bi-arrow-left me-1"></i> Kembali
            </a>
        </div>

        <!-- FORM CARD -->
        <div class="card shadow-sm border-0">

            <div class="card-header bg-white fw-bold">
                Maklumat Sesi Kursus
            </div>

            <div class="card-body">

                <form>

                    <div class="row g-3">

                        <!-- NAMA SESI -->
                        <div class="col-md-6">
                            <label class="form-label">Nama Sesi</label>
                            <input type="text" class="form-control"
                                placeholder="Contoh: Sesi 1 / 2026">
                        </div>

                        <!-- LEVEL -->
                        <div class="col-md-6">
                            <label class="form-label">Level</label>
                            <select class="form-select">
                                <option selected disabled>Pilih Level</option>
                                <option>National</option>
                                <option>State</option>
                            </select>
                        </div>

                        <!-- TARIKH MULA -->
                        <div class="col-md-6">
                            <label class="form-label">Tarikh Mula</label>
                            <input type="date" class="form-control">
                        </div>

                        <!-- TARIKH TAMAT -->
                        <div class="col-md-6">
                            <label class="form-label">Tarikh Tamat</label>
                            <input type="date" class="form-control">
                        </div>

                        <!-- TEMPAT -->
                        <div class="col-md-12">
                            <label class="form-label">Lokasi Kursus</label>
                            <input type="text" class="form-control"
                                placeholder="Contoh: Hospital Kuala Lumpur / Training Centre MyEMT">
                        </div>

                        <!-- SESI STRUKTUR -->
                        <div class="col-md-12">
                            <label class="form-label">Struktur Kursus</label>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" checked>
                                <label class="form-check-label">B-Course: Asas EMT & keselamatan operasi</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" checked>
                                <label class="form-check-label">C-Course: Klinikal & Kemahiran Operasional</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" checked>
                                <label class="form-check-label">TTX: Latihan Tabletop</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" checked>
                                <label class="form-check-label">FTX: Latihan Simulasi Lapangan</label>
                            </div>
                        </div>

                        <!-- OBJEKTIF -->
                        <div class="col-md-12">
                            <label class="form-label">Objektif Kursus</label>
                            <textarea class="form-control" rows="4"
                                placeholder="Contoh: Memperkasa kompetensi operasi, klinikal dan koordinasi MyEMT..."></textarea>
                        </div>

                        <!-- STATUS -->
                        <div class="col-md-6">
                            <label class="form-label">Status Sesi</label>
                            <select class="form-select">
                                <option>Aktif</option>
                                <option>Dalam Perancangan</option>
                                <option>Ditutup</option>
                            </select>
                        </div>

                        <!-- KUOTA -->
                        <div class="col-md-6">
                            <label class="form-label">Kuota Peserta</label>
                            <input type="number" class="form-control" min="1"
                                placeholder="Contoh: 50">
                        </div>

                    </div>

                    <!-- BUTTON -->
                    <div class="mt-4 d-flex justify-content-end">

                        <button type="reset" class="btn btn-outline-secondary me-2">
                            Reset
                        </button>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>
                            Simpan Sesi
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>





  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
