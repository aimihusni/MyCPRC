<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>EBS FORM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- MAIN CSS (JANGAN UBAH) -->
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    body {
      font-size: 14px;
    }

    label, p, input, select, textarea {
      font-size: 14px !important;
    }

    h4, h5, h6 {
      font-weight: 600;
    }

    .wizard-step {
      display: none;
    }

    .wizard-step.active {
      display: block;
    }
  </style>
</head>

<body>

<!-- HEADER (JANGAN BUANG) -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 p-0 sidebar" id="sidebar-placeholder"></aside>

    <!-- MAIN -->
    <main class="col-md-9 col-lg-10 p-4">

      <div class="card shadow-sm">

        <div class="card-body border-bottom">
          <h4 class="mb-1">EBS FORM</h4>
          <p class="text-muted mb-0">
            Sila lengkapkan semua maklumat di bawah.
          </p>
        </div>

        <!-- CONTENT -->
        <div class="card-body">
          
            <form id="ebsForm">
              <div class="card p-3 mb-3">
                <label>Tarikh Bertugas *</label>
                <input type="date" name="tarikh_bertugas" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Tajuk *</label>
                <input type="text" name="tajuk" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Sumber *</label>
                <input type="text" name="sumber" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Tarikh Berita *</label>
                <input type="date" name="tarikh_berita" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Masa *</label>
                <input type="time" name="masa" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Maklumat *</label>
                <textarea name="maklumat" class="form-control" rows="5" required></textarea>
              </div>

              <div class="card p-3 mb-3">
                <label>Pautan *</label>
                <input type="url" name="pautan" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Kategori ESRA *</label>
                <select name="kategori_esra" class="form-select" required>
                  <option value="" disabled selected hidden>-- Pilih --</option>
                  <option>Merah</option>
                  <option>Kuning</option>
                  <option>Hijau</option>
                  <option>Tidak dapat ditentukan</option>
                </select>
              </div>

              <button type="submit" class="btn btn-success">Hantar</button>
            </form>

        </div>
      </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/common.js"></script>


<!-- Load Header/Footer -->
<script>
  fetch("header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

<!-- Load Sidebar -->
<script>
  fetch("sidebar.html")
    .then(res => res.text())
    .then(data => document.getElementById("sidebar-placeholder").innerHTML = data)
    .catch(err => console.error("Sidebar load failed:", err));
</script>

</body>
</html>
