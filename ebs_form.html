<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>EBS FORM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- MAIN CSS (JANGAN UBAH) -->
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    body {
      font-size: 14px;
    }

    label, p, input, select, textarea {
      font-size: 14px !important;
    }

    h4, h5, h6 {
      font-weight: 600;
    }

    .wizard-step {
      display: none;
    }

    .wizard-step.active {
      display: block;
    }
  </style>
</head>

<body>

<!-- HEADER (JANGAN BUANG) -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 p-0 sidebar" id="sidebar-placeholder"></aside>

    <!-- MAIN -->
    <main class="col-md-9 col-lg-10 p-4">

      <div class="card shadow-sm">

        <!-- -->
        <div class="card-body border-bottom">
          <h4 class="mb-1">EBS FORM</h4>
          <p class="text-muted mb-0">
            Sila lengkapkan semua maklumat di bawah.
          </p>
        </div>

        <!-- CONTENT -->
        <div class="card-body">

            <!-- STEP 1 (EBS FORM) -->
            <div class="wizard-step active">

              <div class="card p-3 mb-3">
                <label>Tarikh Bertugas *</label>
                <input type="date" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Tajuk *</label>
                <input type="text" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Sumber *</label>
                <input type="text" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Tarikh Berita *</label>
                <input type="date" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Masa *</label>
                <input type="time" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Maklumat *</label>
                <textarea class="form-control" rows="5" required></textarea>
              </div>

              <div class="card p-3 mb-3">
                <label>Pautan *</label>
                <input type="url" class="form-control" required>
              </div>

              <div class="card p-3 mb-3">
                <label>Kategori ESRA *</label>
                <select class="form-select" required>
                  <option value="" disabled selected hidden>-- Pilih --</option>
                  <option>Merah</option>
                  <option>Kuning</option>
                  <option>Hijau</option>
                  <option>Tidak dapat ditentukan</option>
                </select>
              </div>

              <div class="d-flex justify-content-start">
                <button type="button" class="btn btn-primary next-step">
                  Seterusnya
                </button>
              </div>

            </div>

            <div class="wizard-step">
              <h5>BAHAGIAN 2</h5>

              <div class="card p-3 mb-3">
                <label>Contoh Field</label>
                <input type="text" class="form-control">
              </div>

              <div class="d-flex justify-content-start gap-2">
                <button type="button" class="btn btn-secondary prev-step">Kembali</button>
                <button type="button" class="btn btn-primary next-step">Seterusnya</button>
              </div>
            </div>

            <!-- STEP 3 -->
            <div class="wizard-step">
              <h5>BAHAGIAN 3</h5>

              <div class="card p-3 mb-3">
                <label>Contoh Field</label>
                <input type="text" class="form-control">
              </div>

              <div class="d-flex justify-content-start gap-2">
                <button type="button" class="btn btn-secondary prev-step">Kembali</button>
                <button type="submit" class="btn btn-success">Hantar</button>
              </div>
            </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/common.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {

    const steps = document.querySelectorAll(".wizard-step");
    const nav = document.querySelectorAll("#stepIndicator .nav-link");

    let current = 0;

    function showStep(i) {
      steps.forEach((s, idx) => {
        s.classList.toggle("active", idx === i);
      });

      nav.forEach((b, idx) => {
        b.classList.toggle("active", idx === i);
      });

      current = i;
    }

    document.querySelectorAll(".next-step").forEach(btn => {
      btn.addEventListener("click", () => {
        if (current < steps.length - 1) showStep(current + 1);
      });
    });

    document.querySelectorAll(".prev-step").forEach(btn => {
      btn.addEventListener("click", () => {
        if (current > 0) showStep(current - 1);
      });
    });

    nav.forEach(btn => {
      btn.addEventListener("click", function () {
        showStep(parseInt(this.dataset.step));
      });
    });

    showStep(0);

  });
</script>

<!-- Load Header/Footer -->
<script>
  fetch("/header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  fetch("/footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

<!-- Load Sidebar -->
<script>
  fetch("/sidebar.html")
    .then(res => res.text())
    .then(data => document.getElementById("sidebar-placeholder").innerHTML = data)
    .catch(err => console.error("Sidebar load failed:", err));
</script>

</body>
</html>
