<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyCPRC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Search CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  
  <!-- jQuery (REQUIRED for Select2) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Select2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- BODY -->
<div class="container-fluid">
  <div class="row">

    <!-- LEFT PANEL -->
    <!-- LEFT PANEL -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder">
      <!-- Sidebar will be loaded here -->
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-4">
      <div class="card shadow-sm border-1">

        <div class="card-body">
        <form id="wizardForm" action="http://localhost:3000/submit" method="POST">

        <div class="wizard-step active">
            <h5 class="mb-3">MEJA BANTUAN MYCPRC</h5>

            <div class="row g-3">
                <div class="col-md-6">
                <label class="form-label">Kategori</label>
                <select class="form-select" id="kategori_aduan" name="kategori_aduan" required>
                <option value="">-- Sila Pilih Kategori --</option>
                <option value="Cadangan/ Maklumbalas"> Cadangan/ Maklumbalas</option>
                <option value="Aduan"> Aduan</option>
                <option value="Pertanyaan"> Pertanyaan</option>
                </select>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                <label class="form-label">Nama</label>
                <textarea id="nama_aduan" class="form-control" placeholder="Nama Penuh"></textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                <label class="form-label">Emel</label>
                <textarea id="emel" class="form-control"></textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                <label class="form-label">Keterangan</label>
                <textarea id="keterangan_aduan" class="form-control"></textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                <label class="form-label">Muat Naik</label>
                <textarea id="muat_naik" class="form-control" placeholder="Jika berkaitan"></textarea>
            </div>
        </div>           
        <!-- NAVIGATION -->
        <div class="d-flex justify-content-start mt-4 gap-2">
        <button type="button" class="btn btn-primary" id="">Hantar</button>
        </div>
        </form>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Load Header & Footer -->
<script src="assets/js/common.js"></script>

<script src="assets/js/wizard-form.js"></script>
<script src="assets/js/negeri-daerah.js"></script>
<script src="assets/js/flood_form.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
