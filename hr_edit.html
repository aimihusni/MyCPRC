<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR EDIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
<main class="col-md-9 col-lg-10 px-4 py-4">

  <!-- PAGE HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0">Kemaskini Maklumat Human Resource Misi EMT</h4>
      <small class="text-muted">
        Sila pastikan semua maklumat adalah tepat sebelum hantar.
      </small>
    </div>

    <div class="mb-3 d-flex justify-content-end">
      <a href="mission_detail.html" class="btn btn-primary">
        <i class="bi bi-arrow-left me-1"></i> Kembali
      </a>
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">

      <h5 class="mb-3 fw-semibold">Human Resources EMT</h5>
      <p class="text-muted mb-4">
        Maklumat jumlah anggota EMT yang terlibat dalam misi.
      </p>

      <div class="row g-3">

        <div class="col-md-4">
          <label class="form-label">Doktor</label>
          <input type="number" class="form-control hr-input" id="doctor" min="0" value="2">
        </div>

        <div class="col-md-4">
          <label class="form-label">Jururawat</label>
          <input type="number" class="form-control hr-input" id="nurse" min="0" value="5">
        </div>

        <div class="col-md-4">
          <label class="form-label">Paramedik</label>
          <input type="number" class="form-control hr-input" id="paramedic" min="0" value="3">
        </div>

        <div class="col-md-4">
          <label class="form-label">Pegawai Farmasi</label>
          <input type="number" class="form-control hr-input" id="pharmacist" min="0" value="1">
        </div>

        <div class="col-md-4">
          <label class="form-label">Pegawai Kesihatan Awam</label>
          <input type="number" class="form-control hr-input" id="publicHealth" min="0" value="1">
        </div>

        <div class="col-md-4">
          <label class="form-label">Staf Sokongan</label>
          <input type="number" class="form-control hr-input" id="support" min="0" value="4">
        </div>

        <div class="col-md-4">
          <label class="form-label">Lain-lain</label>
          <input type="number" class="form-control hr-input" id="others" min="0" value="0">
        </div>

        <div class="col-md-4">
          <label class="form-label fw-semibold">Jumlah Keseluruhan</label>
          <input type="number" class="form-control fw-bold bg-light" id="totalHR" value="16" readonly>
        </div>

      </div>

      <!-- BUTTON -->
      <div class="d-flex justify-content-end mt-4">
        <button class="btn btn-primary rounded-pill shadow-sm px-4">
          <i class="bi bi-check-circle me-1"></i> Kemaskini Maklumat HR
        </button>
      </div>

    </div>
  </div>

</main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--auto kira total -->
<script>
function calculateHRTotal() {
    const doctor = parseInt(document.getElementById("doctor").value) || 0;
    const nurse = parseInt(document.getElementById("nurse").value) || 0;
    const paramedic = parseInt(document.getElementById("paramedic").value) || 0;
    const pharmacist = parseInt(document.getElementById("pharmacist").value) || 0;
    const publicHealth = parseInt(document.getElementById("publicHealth").value) || 0;
    const support = parseInt(document.getElementById("support").value) || 0;
    const others = parseInt(document.getElementById("others").value) || 0;

    const total = doctor + nurse + paramedic + pharmacist + publicHealth + support + others;

    document.getElementById("totalHR").value = total;
}

// auto trigger bila user type
document.addEventListener("DOMContentLoaded", function () {
    const inputs = document.querySelectorAll(".hr-input");

    inputs.forEach(input => {
        input.addEventListener("input", calculateHRTotal);
    });

    // kira awal sekali (kalau ada value default)
    calculateHRTotal();
});
</script>

</body>
</html>
