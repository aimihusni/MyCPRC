<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tambah Rekod Penyimpanan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>


    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">

    <!-- PAGE HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h4 class="mb-0">Tambah Rekod Penyimpanan EMT</h4>
        <small class="text-muted">
        Tambah rekod pengurusan stor, kontena dan aset logistik EMT
        </small>
    </div>

    <a href="logistic_all.html" class="btn btn-primary">
        <i class="bi bi-arrow-left me-1"></i> Kembali
    </a>

    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm">
    <div class="card-body">

        <form>

        <h5 class="fw-semibold mb-3">Maklumat Penyimpanan EMT</h5>

        <div class="row g-3">

            <!-- STORAGE NAME -->
            <div class="col-md-6">
            <label class="form-label">Nama Penyimpanan</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: Kontena Logistik A / Stor Utama EMT">
            </div>

            <!-- STORAGE CODE -->
            <div class="col-md-6">
            <label class="form-label">Kod Penyimpanan</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: STO-EMT-001">
            </div>

            <!-- TYPE -->
            <div class="col-md-6">
            <label class="form-label">Jenis Penyimpanan</label>
            <select class="form-select" id="jenisStorage" onchange="toggleStorageLain()">
                <option selected disabled>-- Pilih Jenis --</option>
                <option>Stor EMT Kekal</option>
                <option>Stor Sementara Lapangan</option>
                <option>Kontena 20 Kaki</option>
                <option>Kontena 40 Kaki</option>
                <option>Gudang Hospital</option>
                <option>Mobile Storage Unit</option>
                <option value="lain">Lain-lain</option>
            </select>
            </div>

            <!-- OTHER TYPE -->
            <div class="col-md-6 d-none" id="storageLainBox">
            <label class="form-label">Nyatakan Jenis Lain</label>
            <input type="text"
                    class="form-control"
                    placeholder="Sila nyatakan jenis penyimpanan">
            </div>

            <!-- CATEGORY -->
            <div class="col-md-6">
            <label class="form-label">Kategori Aset Disimpan</label>
            <select class="form-select">
                <option>Perubatan</option>
                <option>Logistik Umum</option>
                <option>Peralatan Kecemasan</option>
                <option>ICT & Komunikasi</option>
                <option>Bekalan Makanan</option>
            </select>
            </div>

            <!-- CONDITION -->
            <div class="col-md-6">
            <label class="form-label">Keadaan Stor</label>
            <select class="form-select">
                <option>Baik</option>
                <option>Memerlukan Pemeriksaan</option>
                <option>Rosak Minor</option>
                <option>Kritikal</option>
            </select>
            </div>

            <!-- CAPACITY -->
            <div class="col-md-6">
            <label class="form-label">Kapasiti</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: 5 Tan / 30 m³ / 200 Item">
            </div>

            <!-- LOCATION -->
            <div class="col-md-6">
            <label class="form-label">Lokasi Stor</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: Base Camp EMT Sabah / Hospital HQ">
            </div>

            <!-- GPS (optional advanced) -->
            <div class="col-md-6">
            <label class="form-label">Koordinat (GPS)</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: 5.9804, 116.0735">
            </div>

            <!-- STATUS -->
            <div class="col-md-6">
            <label class="form-label">Status Operasi</label>
            <select class="form-select">
                <option>Aktif</option>
                <option>Dalam Penggunaan</option>
                <option>Standby</option>
                <option>Penyelenggaraan</option>
                <option>Ditutup</option>
            </select>
            </div>

            <!-- DATE RECEIVED -->
            <div class="col-md-6">
            <label class="form-label">Tarikh Didaftarkan</label>
            <input type="date" class="form-control">
            </div>

            <!-- LAST INSPECTION -->
            <div class="col-md-6">
            <label class="form-label">Tarikh Pemeriksaan Terakhir</label>
            <input type="date" class="form-control">
            </div>

            <!-- RESPONSIBLE PERSON -->
            <div class="col-md-6">
            <label class="form-label">Pegawai Bertanggungjawab</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: En. Ahmad / Unit Logistik EMT">
            </div>

            <!-- NOTES -->
            <div class="col-12">
            <label class="form-label">Catatan</label>
            <textarea class="form-control"
                        rows="3"
                        placeholder="Maklumat tambahan berkaitan stor / keselamatan / penggunaan"></textarea>
            </div>

        </div>

        <!-- BUTTON -->
        <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-circle me-1"></i>
            Simpan Rekod
            </button>
        </div>

        </form>

    </div>
    </div>

    </main>



  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
