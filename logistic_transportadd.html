<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tambah Pengangkutan EMT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>
</head>
<body>
<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">
    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">

    <!-- PAGE HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h4 class="mb-0">Tambah Pengangkutan EMT</h4>
        <small class="text-muted">
        Rekod aset kenderaan logistik EMT (fleet management)
        </small>
    </div>

    <a href="logistic_all.html" class="btn btn-primary">
        <i class="bi bi-arrow-left me-1"></i> Kembali
    </a>

    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm">
    <div class="card-body">

        <form>

        <h5 class="fw-semibold mb-3">Maklumat Aset Pengangkutan EMT</h5>

        <div class="row g-3">

            <!-- VEHICLE ID -->
            <div class="col-md-6">
            <label class="form-label">ID Kenderaan</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: VEH-EMT-001">
            </div>

            <!-- VEHICLE TYPE -->
            <div class="col-md-6">
            <label class="form-label">Jenis Kenderaan</label>
            <select class="form-select" id="vehicleType" onchange="toggleOtherVehicle()">
                <option selected disabled>-- Pilih Jenis --</option>
                <option>Ambulans</option>
                <option>Lori Logistik</option>
                <option>Kenderaan 4x4</option>
                <option>Van Perubatan</option>
                <option>Bas</option>
                <option value="others">Lain-lain</option>
            </select>
            </div>

            <!-- OTHERS -->
            <div class="col-md-6 d-none" id="otherVehicleBox">
            <label class="form-label">Nyatakan Jenis Lain</label>
            <input type="text"
                    class="form-control"
                    placeholder="Sila nyatakan jenis kenderaan">
            </div>

            <!-- REG NO -->
            <div class="col-md-6">
            <label class="form-label">No. Pendaftaran</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: WXY1234">
            </div>

            <!-- ENGINE / FUEL TYPE -->
            <div class="col-md-6">
            <label class="form-label">Jenis Bahan Api</label>
            <select class="form-select">
                <option>Diesel</option>
                <option>Petrol</option>
                <option>Hybrid</option>
            </select>
            </div>

            <!-- CAPACITY: PEOPLE -->
            <div class="col-md-4">
            <label class="form-label">Kapasiti Penumpang</label>
            <input type="number"
                    class="form-control"
                    placeholder="Contoh: 4">
            </div>

            <!-- CAPACITY: LOAD -->
            <div class="col-md-4">
            <label class="form-label">Kapasiti Muatan (kg)</label>
            <input type="number"
                    class="form-control"
                    placeholder="Contoh: 3000">
            </div>

            <!-- CAPACITY: EXTRA INFO -->
            <div class="col-md-4">
            <label class="form-label">Nota Kapasiti</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: Peralatan perubatan / stretcher">
            </div>

            <!-- CURRENT STATUS -->
            <div class="col-md-6">
            <label class="form-label">Status Operasi</label>
            <select class="form-select">
                <option>Tersedia</option>
                <option>Digunakan</option>
                <option>Standby</option>
                <option>Penyelenggaraan</option>
                <option>Rosak</option>
            </select>
            </div>

            <!-- ASSIGNED UNIT -->
            <div class="col-md-6">
            <label class="form-label">Unit Bertanggungjawab</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: Unit Logistik EMT Sabah">
            </div>

            <!-- DRIVER (OPTIONAL) -->
            <div class="col-md-6">
            <label class="form-label">Pemandu Tetap</label>
            <input type="text"
                    class="form-control"
                    placeholder="Nama pemandu (jika ada)">
            </div>

            <!-- LAST SERVICE -->
            <div class="col-md-6">
            <label class="form-label">Servis Terakhir</label>
            <input type="date" class="form-control">
            </div>

            <!-- NEXT SERVICE -->
            <div class="col-md-6">
            <label class="form-label">Servis Seterusnya</label>
            <input type="date" class="form-control">
            </div>

            <!-- LOCATION -->
            <div class="col-md-6">
            <label class="form-label">Lokasi Semasa</label>
            <input type="text"
                    class="form-control"
                    placeholder="Contoh: Base EMT Sabah / HQ Store">
            </div>

            <!-- NOTES -->
            <div class="col-12">
            <label class="form-label">Catatan</label>
            <textarea class="form-control"
                        rows="3"
                        placeholder="Maklumat tambahan (condition, usage, isu teknikal)"></textarea>
            </div>

        </div>

        <!-- BUTTON -->
        <div class="d-flex justify-content-end gap-2 mt-4">

            <a href="logistic_all.html" class="btn btn-outline-secondary px-4">
            Batal
            </a>

            <button type="submit" class="btn btn-dark px-4">
            <i class="bi bi-check-circle me-1"></i>
            Simpan Rekod
            </button>

        </div>

        </form>

    </div>
    </div>

    </main>


  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--TEKAN OTHERS THAN INPUT BOX KELUAR-->
<!-- JS -->
<script>
function toggleOtherVehicle() {
  const select = document.getElementById("vehicleType");
  const box = document.getElementById("otherVehicleBox");

  if (select.value === "others") {
    box.classList.remove("d-none");
  } else {
    box.classList.add("d-none");
  }
}
</script>

</body>
</html>
