<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRANSPORT EDIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">
    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">
        <!-- PAGE HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
            <h4 class="mb-0">Kemaskini Pengangkutan EMT</h4>
            <small class="text-muted">
                Sila kemas kini maklumat pengangkutan logistik EMT
            </small>
            </div>
            <div class="mb-3 d-flex justify-content-end">
            <a href="mission_detail.html" class="btn btn-primary">
                <i class="bi bi-arrow-left me-1"></i> Kembali
            </a>
            </div>
        </div>

        <!-- FORM CARD -->
        <div class="card shadow-sm border-0 mb-3">
            <div class="card-header bg-white">
            <strong>Borang Kemaskini Pengangkutan EMT</strong>
            </div>
            <div class="card-body">
                <form>
                    <!-- MISSION NAME (READ ONLY) -->
                    <div class="mb-4">
                    <label class="form-label text-muted">Nama Misi EMT</label>
                    <input type="text" class="form-control bg-light"
                            value="EMT Sabah Flood Response" readonly>
                    <small class="text-muted">Nama misi tidak boleh diubah</small>
                    </div>
                    <hr>

                    <!-- VEHICLE INFO -->
                    <h6 class="fw-semibold mb-3 text-muted">Maklumat Kenderaan</h6>

                    <div class="row g-3">

                    <!-- VEHICLE TYPE -->
                    <div class="col-md-6">
                        <label class="form-label">Jenis Kenderaan</label>
                            <select class="form-select" id="vehicleType" onchange="toggleOtherVehicle()">
                            <option disabled>-- Pilih Kenderaan --</option>
                            <option selected>Ambulans</option>
                            <option>Lori 3 Tan</option>
                            <option>4x4 Vehicle</option>
                            <option>Van Perubatan</option>
                            <option value="others">Lain-lain</option>
                            </select>
                    </div>

                    <!-- OTHERS INPUT -->
                    <div class="col-md-6 d-none" id="otherVehicleBox">
                        <label class="form-label">Nyatakan Jenis Kenderaan</label>
                        <input type="text" class="form-control"
                            placeholder="Contoh: Bas Mobil Klinik">
                    </div>

                    <!-- REG NO -->
                    <div class="col-md-4">
                        <label class="form-label">No. Pendaftaran</label>
                        <input type="text" class="form-control"
                            value="WXY1234">
                    </div>

                    <!-- CAPACITY -->
                    <div class="col-md-4">
                        <label class="form-label">Kapasiti</label>
                        <input type="text" class="form-control"
                            value="4 Orang + Peralatan">
                    </div>

                    <!-- DRIVER -->
                    <div class="col-md-4">
                        <label class="form-label">Pemandu</label>
                        <input type="text" class="form-control"
                            value="Ahmad Bin Ali">
                    </div>

                    <!-- STATUS -->
                    <div class="col-md-4">
                        <label class="form-label">Status Pengangkutan</label>

                        <select class="form-select">
                        <option>Available</option>
                        <option selected>In Use</option>
                        <option>Maintenance</option>
                        <option>Standby</option>
                        </select>
                    </div>

                    <!-- NOTES -->
                    <div class="col-md-8">
                        <label class="form-label">Catatan</label>
                        <textarea class="form-control" rows="2">
        Digunakan untuk penghantaran peralatan perubatan ke kawasan operasi.
                        </textarea>
                    </div>

                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="logistik_transportView.html"
                            class="btn btn-outline-secondary rounded-pill px-4">
                            Batal
                        </a>
                        <button type="submit"
                                class="btn btn-dark rounded-pill px-4 shadow-sm">
                            <i class="bi bi-check-circle me-1"></i> Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--TEKAN OTHERS THAN INPUT BOX KELUAR-->
<script>
function toggleOtherVehicle() {
  const select = document.getElementById("vehicleType");
  const box = document.getElementById("otherVehicleBox");

  if (select.value === "others") {
    box.classList.remove("d-none");
  } else {
    box.classList.add("d-none");
  }
}
</script>
</body>
</html>
