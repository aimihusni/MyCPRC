<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyReHF Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Search CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  
  <!-- jQuery (REQUIRED for Select2) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Select2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- BODY -->
<div class="container-fluid">
  <div class="row">

    <!-- LEFT PANEL -->
    <!-- LEFT PANEL -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder">
      <!-- Sidebar will be loaded here -->
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-4">
      <div class="card shadow-sm border-1">
        <div class="card-body">
          <h4 class="card-title mb-3">MALAYSIA RESILIENT HEALTHCARE FACILITIES</h4>          
        </div>
        <div class="card-body">
        <form id="wizardForm" data-free-mode="true">
        <div class="mb-4">
            <ul class="nav nav-pills justify-content-center" id="stepIndicator">
                <li class="nav-item">
                    <button type="button" class="nav-link active" >1</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link" >2</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link">3</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link">4</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link">5</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link">6</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link">7</button>
                </li>
            </ul>
        </div>
        
        <!-- ================= STEP 1 ================= -->
        <div class="wizard-step active">
            <h5 class="mb-3">ABOUT FACILITIES</h5>

            <div class="row g-3">
                <div class="col-md-6">
                <label class="form-label">Negeri</label>
                <select class="form-select" id="negeri_fasiliti" name="negeri_fasiliti" required>
                <option value="">-- Sila Pilih Negeri --</option>
                </select>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                <label class="form-label">Daerah</label>
                <select class="form-select" id="daerah_fasiliti" name="daerah_fasiliti" required>
                    <option value="">-- Sila Pilih Daerah --</option>
                    <option value="Lain-Lain">Lain-lain</option>
                </select>
                </div>
            
                <div class="col-md-6 d-none" id="daerahLainWrapperFasiliti">
                <label class="form-label">Sila Nyatakan Daerah</label>
                <input
                    type="text"
                    class="form-control"
                    id="daerahLainFasiliti"
                    name="daerahLainFasiliti"
                    placeholder="Nama Daerah"
                >
                </div>
            </div>
            
            <div class="mb-3">
                <div class="col-md-6">
                    <label class="form-label required">Mukim</label>
                    <input id="mukim_fasiliti" name="mukim_fasiliti" class="form-control text-uppercase">
                </div>
            </div>

            <div class="mb-3">
                <div class="col-md-6">
                    <label class="form-label required">Nama Fasiliti</label>
                    <textarea id="namaFasiliti" class="form-control" rows="2" placeholder="Contoh: Hospital Putrajaya"></textarea>
                </div>
            </div>

            <div class="mb-3">
                <div class="col-md-6">
                    <label class="form-label">Alamat Penuh</label>
                    <textarea id="alamatFasiliti" class="form-control" rows="2" placeholder="Contoh: Hospital Putrajaya, Pusat Pentadbiran Kerajaan Persekutuan, Presint 7, 62250 Putrajaya"></textarea>
                </div>
            </div>
            <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="lokasiFasiliti">Cari Lokasi Berdasarkan Alamat</button>

            <div id="map_fasiliti" style="height:350px;"></div>

            <!-- Simpan koordinat -->
            <input type="hidden" name="latitude_fasiliti" id="latitude_fasiliti" required>
            <input type="hidden" name="longitude_fasiliti" id="longitude_fasiliti" required>

            <!-- Display koordinat live -->
            <div class="mt-2">
            <strong>Latitude:</strong> <span id="latDisplayFasiliti">-</span> |
            <strong>Longitude:</strong> <span id="lngDisplayFasiliti">-</span>
            </div>
        </div>
        
        <!-- ================= STEP 2 : EMERGENCY MANAGEMENT ================= -->
        <div class="wizard-step">
            <h5 class="mb-3">SECTION A : EMERGENCY MANAGEMENT</h5>
            
            <div class="row">
                <div class="mb-3">
                <label class="form-label required">1. Have the major internal and external risks that could severely disrupt health facility operations been identified and described through a 5x5 risk matrix (within the last 1-year)</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em1" id="em1_0" value="0" required>
                <label class="form-check-label" for="em1_0">No</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em1" id="em1_1" value="1" required>
                <label class="form-check-label" for="em1_1">Somewhat</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em1" id="em1_2" value="2" required>
                <label class="form-check-label" for="em1_2">Yes</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">2. Does the health facility monitor, receive, and act upon alerts and early warnings related to changing external environmental conditions (e.g., air quality, extreme weather events, volcano)?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em2" id="em2_0" value="0" required>
                <label class="form-check-label" for="em2_0">No, do not receive, monitor or act on alerts or early warnings</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em2" id="em2_1" value="1" required>
                <label class="form-check-label" for="em2_1">Somewhat functional but gaps remain for the HF receive, monitor and act upon early warnings</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em2" id="em2_2" value="2" required>
                <label class="form-check-label" for="em2_2">Yes, the health facility is well-linked and coordinated with the early warning mechanisms in-country to act upon alerts/warnings</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">3. Does the health facility have procedures and tools to assess and report,damage and monitor disruption to health services due to emergencies?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em3" id="em3_0" value="0" required>
                <label class="form-check-label" for="em3_0">Procedures to assess damage, report, and monitor do not exist or exist only as a document</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em3" id="em3_1" value="1" required>
                <label class="form-check-label" for="em3_1">Procedures/tools to assess damage and monitor disruption exist, personnel have been trained, but procedures have not updated or practised.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em3" id="em3_2" value="2" required>
                <label class="form-check-label" for="em3_2">Procedures/tools to assess damage and monitor disruption exist, personnel have been trained, and procedures are updated and have been practised.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">4. Are designated staff well-trained and ready to assess and report damage and/or disruption of health service operations in the event of an emergency</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em4" id="em4_0" value="0" required>
                <label class="form-check-label" for="em4_0">No, not at all</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em4" id="em4_1" value="1" required>
                <label class="form-check-label" for="em4_1">Staff can support assessments with support from province or national level</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em4" id="em4_2" value="2" required>
                <label class="form-check-label" for="em4_2">Staff are ready to assess without needing support from province or national level</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">5. Does the health facility have a mechanism to alert staff to potential risks, including relevant external alerts (e.g. severe weather, environmental warnings) and provide clear safety guidance on appropriate protective actions during an emergencies?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em5" id="em5_0" value="0" required>
                <label class="form-check-label" for="em5_0">No clear system or mechanism in place</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em5" id="em5_1" value="1" required>
                <label class="form-check-label" for="em5_1">Mechanism exists but not consistently functioning</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em5" id="em5_2" value="2" required>
                <label class="form-check-label" for="em5_2">Internal staff communication mechanism in place and well-functioning</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">6. Is there a cybersecurity system and plan in place to protect the health facility and its assets (e.g. patient records, telecommunications, data, cloud storage)</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em6" id="em6_0" value="0" required>
                <label class="form-check-label" for="em6_0">The health facility does not have a computer security system plan and procedures in place;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em6" id="em6_1" value="1" required>
                <label class="form-check-label" for="em6_1">The health facility has a basic cyber security plan in place but it is not monitored</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em6" id="em6_2" value="2" required>
                <label class="form-check-label" for="em6_2">The health facility has a cyber security plan in place and it is updated regularly.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">7. Does the health facility have an established and well-functioning health facility incident management system (or equivalent) and emergency operations centre [EOC] (or equivalent) to manage any major emergency or disaster responses, including coordination with stakeholders and local authorities (e.g. police, NDMO, fire, search and rescue)?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em7" id="em7_0" value="0" required>
                <label class="form-check-label" for="em7_0">No arrangements for health facility incident management
                exist or EOC</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em7" id="em7_1" value="1" required>
                <label class="form-check-label" for="em7_1">Staff assigned to key health facility incident management
                positions for emergencies but with no written procedures to operationalize its functions or convene through the EOC</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em7" id="em7_2" value="2" required>
                <label class="form-check-label" for="em7_2">health facility incident management procedures exist and are fully
                operational with properly trained personnel to assume different coordination roles and responsibilities through a coordinated EOC (or equivalent)</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">8. Is the health facility emergency response plan linked to the overall local (whole-of-government) emergency response plan?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em8" id="em8_0" value="0" required>
                <label class="form-check-label" for="em8_0">The plans are not linked or there is no documentation that demonstrates linkage;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em8" id="em8_1" value="1" required>
                <label class="form-check-label" for="em8_1">Plans are linked officially but not operational;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em8" id="em8_2" value="2" required>
                <label class="form-check-label" for="em8_2">Plans are well-linked and operational.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">9. Does the health facility have direct communication and coordination mechanisms with water providers to support continuity of, and safety of, water supply, including during emergencies?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em9" id="em9_0" value="0" required>
                <label class="form-check-label" for="em9_0">No direct or formal communication or coordination with water providers</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em9" id="em9_1" value="1" required>
                <label class="form-check-label" for="em9_1">Some communication exists, but it is informal or irregular. Coordination may occur during supply issues but is not proactive.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em9" id="em9_2" value="2" required>
                <label class="form-check-label" for="em9_2">Regular and scheduled communication with service providers with established and documented  response plan is operational to supportwater continuity and safety at all times, including during emergencies</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">10. Does the health facility have a community listening mechanism set-up  and functioning  to facilitate two-way communication during both emergency and non-emergency situations?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em10" id="em10_0" value="0" required>
                <label class="form-check-label" for="em10_0">None in place</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em10" id="em10_1" value="1" required>
                <label class="form-check-label" for="em10_1">The community listening exists but information is not yet used to inform decisions</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em10" id="em10_2" value="2" required>
                <label class="form-check-label" for="em10_2">Yes, the mechanism is in place, fully functional and results are used to inform decision making in emergency and non-emergency situations</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">11. Does the health facility have the ability in collaboration with local health authorities to communicate risks to the right people, fast, in a way they trust and can act on?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em11" id="em11_0" value="0" required>
                <label class="form-check-label" for="em11_0">None are available</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em11" id="em11_1" value="1" required>
                <label class="form-check-label" for="em11_1">Some ability to communicate but system needs strengthening to be more effective</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em11" id="em11_2" value="2" required>
                <label class="form-check-label" for="em11_2">Strong mechanism to communicate risks effectively</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">12. Is the health facility's Emergency and Disaster Response Plan OR its SOPs up to date, operational and known by personnel</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em12" id="em12_0" value="0" required>
                <label class="form-check-label" for="em12_0">The plan does not exist or a document is not available;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em12" id="em12_1" value="1" required>
                <label class="form-check-label" for="em12_1">The plan exists but it is not updated within the last two years, and/or it has not been distributed, and/or it has not been used in simulation exercises;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em12" id="em12_2" value="2" required>
                <label class="form-check-label" for="em12_2">The plan exists, it is operational, it is updated (within the last two years), it has been distributed, and it has been used in simulation exercises.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">13. Based on the risk profile, does the health facility have SOPs, clinical management guidelines and other contingency plans to manage all identified major emergency risks (e.g. high-impact/high likelihood and high-impact/low likelihood)</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em13" id="em13_0" value="0" required>
                <label class="form-check-label" for="em13_0">Plan/SOPs do not address managing likely internal or external emergencies</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em13" id="em13_1" value="1" required>
                <label class="form-check-label" for="em13_1">The plan/SOPs only address some of the major emergency risks that could disrupt health facility operations (based on risk matrix)</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em13" id="em13_2" value="2" required>
                <label class="form-check-label" for="em13_2">The plan/SOPs address all major emergency risks that could disrupt health facility operations (based on risk matrix)</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">14. Verify that the plan indicates the type of signal as well as how, when and who is responsible for activating and deactivating the plan.</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em14" id="em14_0" value="0" required>
                <label class="form-check-label" for="em14_0">Procedures are not addressed or are addressed only in the document;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em14" id="em14_1" value="1" required>
                <label class="form-check-label" for="em14_1">Procedures are included in the plan, but personnel are not familiar;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em14" id="em14_2" value="2" required>
                <label class="form-check-label" for="em14_2">Procedures are included and personnel are familiar with them.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">15. Does the health facility have funds specifically budgeted for emergencies, with allocations available for both preparedness and response activities?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em15" id="em15_0" value="0" required>
                <label class="form-check-label" for="em15_0">Funds have not been allocated or there is no documentation showing budget</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em15" id="em15_1" value="1" required>
                <label class="form-check-label" for="em15_1">Budget exists but only guarantees for disaster and emergency preparedness activities or only for disaster and emergency response activities;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em15" id="em15_2" value="2" required>
                <label class="form-check-label" for="em15_2">Funds allocated for both disaster and emergency preparedness and response activities.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">16. Does the health facility’s plan specify actions to ensure continuity of essential health services and service delivery during an emergency or disaster (including WASH, energy, staff, and supplies)</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em16" id="em16_0" value="0" required>
                <label class="form-check-label" for="em16_0">Actions are not included or are addressed only in document</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em16" id="em16_1" value="1" required>
                <label class="form-check-label" for="em16_1">Actions are included, but resources are not available;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em16" id="em16_2" value="2" required>
                <label class="form-check-label" for="em16_2">Actions are included, resources available and have been completely implemented.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">17. Does the health facility have staffing procedures to ensure continuity of operations during emergencies and disasters occurring at nights, weekends, or holidays, consistent with its role in the health system?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em17" id="em17_0" value="0" required>
                <label class="form-check-label" for="em17_0">Procedures do not exist or there is no documentation on the procedures;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em17" id="em17_1" value="1" required>
                <label class="form-check-label" for="em17_1">Procedures exist, but personnel have not been trained;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em17" id="em17_2" value="2" required>
                <label class="form-check-label" for="em17_2">Procedures exist and personnel trained.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">18. Does the plan identifies physical space that can be equipped and expanded to provide health services?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em18" id="em18_0" value="0" required>
                <label class="form-check-label" for="em18_0">Space for expansion has not been identified or there is no documentation regarding expansion;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em18" id="em18_1" value="1" required>
                <label class="form-check-label" for="em18_1">Areas for expansion have been identified and personnel have been trained to undertake the expansion, but there are no resources for expansion;</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em18" id="em18_2" value="2" required>
                <label class="form-check-label" for="em18_2">Procedures exists, personnel have been trained and resources are in place to carry out expansion of space.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">19. Are there SOPs in place and tested for evacuating occupants of the health facility including special considerations for people with vulnerabilities (people with disabilities, critical patients, older adults, children)</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="em19" id="em19_0" value="0" required>
                <label class="form-check-label" for="em19_0">Procedures do not exist or there is no documentation on the procedures;</label>
                </div>

                <div class="form-check">

                <label class="form-check-label" for="in16_1">Yes – Damage occurred in the past but has been partially addressed</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in16" id="in16_2" value="2" required>
                <label class="form-check-label" for="in16_2">No history of major structural failure, or previous issues have been fully repaired and certified safe</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">17. Are all emergency exits and evacuation pathways clearly labeled, kept free of obstructions, and consistently maintained to guarantee that everyone, including patients, staff, and visitors, can safely and quickly evacuate during an emergency?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in17" id="in17_0" value="0" required>
                <label class="form-check-label" for="in17_0">Emergency exits are frequently or permanently obstructed. Exit signs are missing, damaged, unlit, or unclear. Evacuation routes are not clearly marked, contain hazards</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in17" id="in17_1" value="1" required>
                <label class="form-check-label" for="in17_1">Emergency exits are generally clear, but occasional or temporary obstructions may occur. Exit signs are present and functional, though some may be dim or require minor repair. Evacuation routes are mostly clear and marked, but may have isolated minor hazards or areas where lighting is suboptimal.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in17" id="in17_2" value="2" required>
                <label class="form-check-label" for="in17_2">All emergency exits are consistently and completely clear of any obstructions. Exit signs are highly visible, well-lit, and universally understood. Evacuation routes are clearly marked with consistent signage, well-lit throughout, free of all hazards, and regularly inspected and maintained.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">18. Does the healthcare facility have the fuel storage located in a safe and secure site, adequately protected from local hazard?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in18" id="in18_0" value="0" required>
                <label class="form-check-label" for="in18_0">Fuel storage are located in high-risk areas with no protective measures in place during emergency events.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in18" id="in18_1" value="1" required>
                <label class="form-check-label" for="in18_1">Fuel storage are located in high-risk areas with sufficient protective measures in place during emergency events</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in18" id="in18_2" value="2" required>
                <label class="form-check-label" for="in18_2">Fuel storage are located in low-risk areas with all protective measures in place during emergency events.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">19. Is LED lighting standard across clinical and non-clinical areas?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in19" id="in19_0" value="0" required>
                <label class="form-check-label" for="in19_0">LED lighting is not in use, or only minimal pilot installations exist.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in19" id="in19_1" value="1" required>
                <label class="form-check-label" for="in19_1">LED lighting is installed in some areas (e.g., selected wards, offices, or common areas), but conventional lighting remains widely in use.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in19" id="in19_2" value="2" required>
                <label class="form-check-label" for="in19_2">LED lighting is installed in all or nearly all clinical and non-clinical areas, with remaining fixtures scheduled for replacement.</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">20. Is there sufficient lighting both for routine and in emergencies, in key locations (reception, bathrooms, corredors, exits, carpark, etc) for safety of staff especially women at night ?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in20" id="in20_0" value="0" required>
                <label class="form-check-label" for="in20_0">Mostareas do not have suffiecient lighting either for routine or emergencies</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in20" id="in20_1" value="1" required>
                <label class="form-check-label" for="in20_1">Most areas have sufficient lighting for routine or but not emergencies, or there are major gaps in lighting, such as bathroomsemergencies</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in20" id="in20_2" value="2" required>
                <label class="form-check-label" for="in20_2">All areas have sufficient lighting for routine and emergencies</label>
                </div>

                </div>

                <div class="mb-3">
                <label class="form-label required">21. Does the health facility have availability of equipment and supplies to protect against mosquito borne diseases?</label>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in21" id="in21_0" value="0" required>
                <label class="form-check-label" for="in21_0">equipment and supplies are not available.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in21" id="in21_1" value="1" required>
                <label class="form-check-label" for="in21_1">equipment and supplies available for parts of the facility or broken.</label>
                </div>

                <div class="form-check">
                <input class="form-check-input" type="radio" name="in21" id="in21_2" value="2" required>
                <label class="form-check-label" for="in21_2">equipment and supplies available cover all facility</label>
                </div>

                </div>

            </div>
        </div>

        <div class="d-flex justify-content-start mt-4 gap-2">
