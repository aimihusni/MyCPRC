<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>EBS Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    body { font-size: 14px; }
    label, input, textarea, select { font-size: 14px !important; }
  </style>
</head>

<body>

<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <aside class="col-md-3 col-lg-2 p-0 sidebar" id="sidebar-placeholder"></aside>

    <main class="col-md-9 col-lg-10 p-4">

      <div class="card shadow-sm">

        <div class="card-body border-bottom">
          <h4 class="mb-1">PEMANTAUAN EBS</h4>
          <p class="text-muted mb-0">
            Sila lengkapkan semua maklumat di bawah
          </p>
        </div>

        <div class="card-body">

          <form id="ebsForm">

            <!-- Tarikh Bertugas -->
            <div class="mb-3">
              <label>Tarikh Bertugas *</label>
              <input type="date" class="form-control" required>
            </div>

            <!-- Tajuk -->
            <div class="mb-3">
              <label>Tajuk *</label>
              <input type="text" class="form-control" required>
            </div>

            <!-- Sumber -->
            <div class="mb-3">
              <label>Sumber *</label>
              <input type="text" class="form-control" required>
            </div>

            <!-- Tarikh berita -->
            <div class="mb-3">
              <label>Tarikh Berita *</label>
              <input type="date" class="form-control" required>
            </div>

            <!-- Masa -->
            <div class="mb-3">
              <label>Masa *</label>
              <input type="time" class="form-control" required>
            </div>

            <!-- Maklumat -->
            <div class="mb-3">
              <label>Maklumat *</label>
              <textarea class="form-control" rows="5" required></textarea>
            </div>

            <!-- Link -->
            <div class="mb-3">
              <label>Pautan *</label>
              <input type="url" class="form-control" required>
            </div>

            <!-- Kategori -->
            <div class="mb-3">
              <label>Kategori ESRA *</label>
              <select class="form-select" required>
                <option value="" disabled selected hidden>-- Pilih --</option>
                <option>Merah</option>
                <option>Kuning</option>
                <option>Hijau</option>
                <option>Tidak dapat ditentukan</option>
              </select>
            </div>

            <!-- BUTTON -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success">
                Hantar
              </button>

              <button type="reset" class="btn btn-secondary">
                Reset
              </button>
            </div>

          </form>

        </div>
      </div>

    </main>
  </div>
</div>

<div id="footer"></div>
<!-- Load Header & Footer -->
<script>
  fetch("header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

<!-- Load Sidebar -->
<script>
  fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data)
  .catch(err => console.error("Sidebar load failed:", err));
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/common.js"></script>

</body>
</html>
