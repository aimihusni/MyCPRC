<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SARI Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- BODY -->
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-4">

      <div class="card shadow-sm border-1">
        
        <!-- PAGE HEADER -->
        <div class="card-body">
          <h4 class="card-title mb-3">Borang SARI Surveillance</h4>
          <p class="text-muted">
            Sila lengkapkan maklumat yang diperlukan di setiap bahagian sebelum menghantar laporan ini.
          </p>
        </div>

        <!-- PAGE CONTENT -->
        <div class="card-body">
          
            <!-- WIZARD -->
            <div class="mb-4">
                <ul class="nav nav-pills justify-content-center" id="stepIndicator">

                    <li class="nav-item">
                        <button type="button" class="nav-link active" data-step="0">1</button>
                    </li>

                    <li class="nav-item">
                        <button type="button" class="nav-link" data-step="1">2</button>
                    </li>

                    <li class="nav-item">
                        <button type="button" class="nav-link" data-step="2">3</button>
                    </li>

                    <li class="nav-item">
                        <button type="button" class="nav-link" data-step="3">4</button>
                    </li>
                </ul>
            </div>

                <style>
                    .wizard-step { display: none; }
                    .wizard-step.active { display: block; }
                </style>

                <div class="container mt-4">

                    <form id="wizardForm">

                        <!-- patient info -->
                        <div class="wizard-step active">
                            <h5 class="mb-3">1. MAKLUMAT PESAKIT</h5>
                            <div class="card mb-4 shadow-sm">
                                <div class="card-body">

                                    <div class="mb-3">
                                        <label class="form-label">Minggu Epid</label>
                                        <input type="number" class="form-control" name="epid_week" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Nombor FLU SARI</label>
                                        <input type="text" class="form-control" name="flu_sari_number" 
                                        placeholder="Contoh: SARI/IMR/0000/25"
                                        required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Nama Pesakit</label>
                                        <input type="text" class="form-control" name="patient_name" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">No. Pengenalan (Tanpa (-))</label>
                                        <input type="number" class="form-control" name="identification_number" 
                                        placeholder="Contoh: 101010101010"
                                        required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">RN</label>
                                        <input type="text" class="form-control" name="rn" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Jantina</label>
                                        <select class="form-select" name="sex" required>
                                            <option disabled selected>Pilih...</option>
                                            <option>Lelaki</option>
                                            <option>Perempuan</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Umur</label>
                                        <input type="number" class="form-control" name="age" required>
                                    </div>

                                    <button type="button" class="btn btn-primary next-step"> Seterusnya </button>
                                </div>
                            </div>
                        </div>

                        <!-- 2. hospital info -->
                        <div class="wizard-step">
                            <h5 class="mb-3">2. MAKLUMAT HOSPITAL & SAMPEL</h5>
                            <div class="card mb-4 shadow-sm">
                                <div class="card-body">

                                    <div class="mb-3">
                                        <label class="form-label">Hospital</label>
                                        <select class="form-select" name="hospital" required>
                                            <option disabled selected>Pilih Hospital...</option>
                                            <option>Kuala Lumpur Hospital, Pathology</option>
                                            <option>Melaka Hospital, Nephrology</option>
                                            <option>Melaka Hospital, Pathology</option>
                                            <option>Pulau Pinang Hospital, Pathology</option>
                                            <option>Queen Elizabeth Hospital, Pathology</option>
                                            <option>Raja Perempuan Zainab II Hospital (Kelantan), Pathology</option>
                                            <option>Raja Permaisuri Bainun Hospital (Ipoh), Pathology</option>
                                            <option>Sultanah Aminah Hospital (Johor Bahru), Pathology</option>
                                            <option>Sultanah Bahiyah Hospital (Alor Setar), Pathology</option>
                                            <option>Sultanah Nur Zahirah Hospital (Kuala Terengganu), Pathology</option>
                                            <option>Tengku Ampuan Afzan Hospital (Pahang), Pathology</option>
                                            <option>Tengku Ampuan Rahimah Hospital (Klang), Pathology</option>
                                            <option>Tuanku Fauziah Hospital (Perlis), Pathology</option>
                                            <option>Tuanku Jaafar Hospital (Seremban), Pathology</option>
                                            <option>Umum Sarawak Hospital, Pathology</option>
                                            <option>Wanita & Kanak Kanak (Hospital Kuala Lumpur) Pathology Diagnostic</option>
                                            <option>Wanita & Kanak-Kanak Sabah Hospital (Likas), Pathology</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Tarikh Sampel Diterima (TC)</label>
                                        <input type="date" class="form-control" name="date_received_tc" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Tarikh Sampel Diterima (Mol)</label>
                                        <input type="date" class="form-control" name="date_received_mol" required>
                                    </div>

                                    <div class="d-flex gap-2">
                                        <button type="button" class="btn btn-secondary prev-step"> Kembali </button>
                                        <button type="button" class="btn btn-primary next-step"> Seterusnya </button>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <!-- pcr result -->
                        <div class="wizard-step">
                            <h5 class="mb-3">3. KEPUTUSAN UJIAN PCR</h5>
                            <div class="card mb-4 shadow-sm">
                                <div class="card-body">

                                    <div class="mb-3">
                                        <label class="form-label">Keputusan PCR Influenza</label>
                                        <select class="form-select" name="influenza_pcr_result" required>
                                            <option disabled selected>Pilih...</option>
                                            <option>INFLUENZA A/H1pdm09 DIKESAN</option>
                                            <option>INFLUENZA A/H3 DIKESAN</option>
                                            <option>INFLUENZA B DIKESAN</option>
                                            <option>TIDAK DIKESAN</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Tarikh Ujian PCR Influenza</label>
                                        <input type="date" class="form-control" name="date_of_influenza_pcr" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Keputusan PCR COVID-19</label>
                                        <select class="form-select" name="covid19_pcr_result" required>
                                            <option disabled selected>Pilih...</option>
                                            <option>SARS-CoV-2 DIKESAN</option>
                                            <option>TIDAK DIKESAN</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Tarikh Ujian PCR COVID-19</label>
                                        <input type="date" class="form-control" name="date_of_covid19_pcr" required>
                                    </div>

                                    <div class="d-flex gap-2">
                                        <button type="button" class="btn btn-secondary prev-step"> Kembali </button>
                                        
                                        <button type="button" class="btn btn-primary next-step"> Seterusnya </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- wgs result -->
                        <div class="wizard-step">
                            <h5 class="mb-3">4. MAKLUMAT WGS</h5>
                            <div class="card mb-4 shadow-sm">
                                <div class="card-body">

                                    <div class="mb-3">
                                        <label class="form-label">Layak untuk WGS</label>
                                        <select class="form-select" name="qualified_for_wgs">
                                            <option disabled selected>Pilih...</option>
                                            <option>N/A</option>
                                            <option>NO</option>
                                            <option>YES</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Status Ujian WGS</label>
                                        <select class="form-select" name="status_of_wgs_test">
                                            <option disabled selected>Pilih...</option>
                                            <option>N/A</option>
                                            <option>PENDING</option>
                                        </select>
                                    </div>

                                    <div class="d-flex gap-2">
                                        <button type="button" class="btn btn-secondary prev-step"> Kembali </button>
                                        <button type="submit" class="btn btn-success submit-btn"> Hantar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

        </div>

      </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Common Layout JS -->
<script src="assets/js/common.js"></script>

<script>
    const steps = document.querySelectorAll('.wizard-step');
    const navButtons = document.querySelectorAll('#stepIndicator .nav-link');

    // Paparkan langkah tertentu
    function showStep(step) {
        steps.forEach((el, index) => {
            el.classList.toggle('active', index === step);
            el.classList.toggle('d-none', index !== step);
        });

        navButtons.forEach((btn, index) => {
            btn.classList.toggle('active', index === step);
        });
    }

    // Butang Seterusnya
    document.querySelectorAll('.next-step').forEach(btn => {
        btn.addEventListener('click', () => {
            let current = [...steps].findIndex(s => s.classList.contains('active'));
            if (current < steps.length - 1) {
                showStep(current + 1);
            }
        });
    });

    // Butang Kembali
    document.querySelectorAll('.prev-step').forEach(btn => {
        btn.addEventListener('click', () => {
            let current = [...steps].findIndex(s => s.classList.contains('active'));
            if (current > 0) {
                showStep(current - 1);
            }
        });
    });

    // Klik nombor wizard (1–5)
    navButtons.forEach(btn => {
        btn.addEventListener('click', function () {
            const step = parseInt(this.getAttribute('data-step'));
            showStep(step);
        });
    });

    // Mula dengan Step 0
    showStep(0);
</script>

</body>
</html>
