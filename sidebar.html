<!-- sidebar.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sidebar</title>

  <!-- Bootstrap Icons (already used in your original) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --sidebar-width: 250px;
      --transition-speed: 0.35s;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      font-family: system-ui, sans-serif;
      background: #f8f9fa;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: #ffffff;
      border-right: 1px solid #e9ecef;
      box-shadow: 2px 0 10px rgba(0,0,0,0.03);
      transition: transform var(--transition-speed) ease;
      transform: translateX(0);
      z-index: 1000;
      overflow-y: auto;
    }

    /* Hidden on mobile by default */
    @media (max-width: 991.98px) {
      #sidebar {
        transform: translateX(-100%);
      }
    }

    /* When open */
    #sidebar.open {
      transform: translateX(0);
    }

    /* Main content – shifts when sidebar is open */
    #main-content {
      margin-left: 0;
      transition: margin-left var(--transition-speed) ease;
      width: 100%;
      min-height: 100vh;
      padding: 1rem;
    }

    #sidebar.open ~ #main-content {
      margin-left: var(--sidebar-width);
    }

    /* Toggle button */
    #toggle-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 1100;
      width: 44px;
      height: 44px;
      background: #0d6efd;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: left var(--transition-speed) ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sidebar.open ~ #toggle-btn {
      left: calc(var(--sidebar-width) + 1rem);
    }

    /* Hide toggle on desktop */
    @media (min-width: 992px) {
      #toggle-btn {
        display: none;
      }
      #main-content {
        margin-left: var(--sidebar-width) !important;
      }
    }

    /* Your original styles (kept) */
    .user-info {
      border-bottom: 1px solid #e9ecef;
    }

    .nav-link {
      color: #495057;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      margin: 0.25rem 0.75rem;
      transition: all 0.25s ease;
      font-weight: 500;
    }

    .nav-link:hover {
      background-color: #e9ecef;
      color: #0d6efd;
      transform: translateX(4px);
    }

    .nav-link.logout:hover {
      background-color: #f8d7da;
      color: #dc3545 !important;
    }

    .nav-link i {
      width: 24px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Toggle button -->
<button id="toggle-btn">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="p-0">
    <!-- User Info -->
    <div class="user-info p-4 border-bottom">
      <h6 class="mb-1 fw-semibold">User Name</h6>
      <small class="text-muted">user@email.com</small>
    </div>

    <!-- Navigation -->
    <ul class="nav flex-column mt-3 px-2">
      <li class="nav-item">
        <a class="nav-link" href="#">
          <i class="bi bi-person me-2"></i>User Profile
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="index.html">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="report.html">
          <i class="bi bi-file-earmark-text me-2"></i>Reporting
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="https://us-east-1.quicksight.aws.amazon.com/sn/embed/share/accounts/917003953046/dashboards/24000dab-50bb-471b-8375-3c56de3506af?directory_alias=poc-mycprc-quicksuite">
          <i class="bi bi-bar-chart me-2"></i>Analysis
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="alert.html">
          <i class="bi bi-exclamation-circle me-2"></i>Alert
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="helpdesk.html">
          <i class="bi bi-life-preserver me-2"></i>Helpdesk
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="manual.html">
          <i class="bi bi-book me-2"></i>Manual
        </a>
      </li>

      <li class="nav-item mt-4">
        <a class="nav-link text-danger logout" href="#" id="sidebarSignOut">
          <i class="bi bi-box-arrow-right me-2"></i>Back To Main Page
        </a>
      </li>
    </ul>
  </div>
</aside>

<!-- Main content area (full screen when sidebar closed) -->
<main id="main-content">
  <h1>Main Content</h1>
  <p>Your page content goes here. When sidebar is closed, this area becomes full-screen.</p>
</main>

<script>
  const toggleBtn = document.getElementById('toggle-btn');
  const sidebar = document.getElementById('sidebar');

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    // Optional: change icon to X when open
    toggleBtn.innerHTML = sidebar.classList.contains('open')
      ? '<i class="bi bi-x-lg"></i>'
      : '<i class="bi bi-list"></i>';
  });

  // Close sidebar when clicking outside (mobile)
  document.addEventListener('click', (e) => {
    if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target) && window.innerWidth < 992) {
      sidebar.classList.remove('open');
      toggleBtn.innerHTML = '<i class="bi bi-list"></i>';
    }
  });

  // Your existing sign-out logic (if any)
  document.getElementById('sidebarSignOut')?.addEventListener('click', (e) => {
    e.preventDefault();
    // Your sign-out code here...
    // Optionally close sidebar after sign-out
    sidebar.classList.remove('open');
    toggleBtn.innerHTML = '<i class="bi bi-list"></i>';
  });
</script>

</body>
</html>
