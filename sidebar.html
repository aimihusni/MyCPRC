<style>
  /* ==========================================
     SIDEBAR SLIDE + FULL-SCREEN CONTENT
  ========================================== */

  .sidebar-wrapper {
    position: relative;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 250px;
    height: 100vh;
    background-color: #ffffff;
    border-right: 1px solid #e9ecef;
    box-shadow: 2px 0 10px rgba(0,0,0,0.03);
    transition: transform 0.3s ease;
    transform: translateX(0);
    z-index: 1000;
    overflow-y: auto;
  }

  /* Hidden by default on mobile */
  @media (max-width: 991px) {
    .sidebar {
      transform: translateX(-100%);
    }
  }

  /* When open */
  .sidebar.open {
    transform: translateX(0);
  }

  /* Main content expands when sidebar closed */
  #main-content {
    transition: margin-left 0.3s ease;
    margin-left: 0;
    width: 100%;
  }

  .sidebar.open ~ #main-content {
    margin-left: 250px;
  }

  /* Toggle button */
  .sidebar-toggle {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 1100;
    width: 44px;
    height: 44px;
    background: #0d6efd;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    transition: left 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar.open ~ .sidebar-toggle {
    left: 260px;
  }

  /* Hide toggle on desktop */
  @media (min-width: 992px) {
    .sidebar-toggle {
      display: none;
    }
    #main-content {
      margin-left: 250px !important;
    }
  }

  /* Overlay */
  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .sidebar.open ~ .sidebar-overlay {
    opacity: 1;
    pointer-events: auto;
  }

  /* Your original styles */
  .user-info {
    border-bottom: 1px solid #e9ecef;
  }

  .nav-link {
    color: #495057;
    padding: 0.75rem 1.25rem;
    border-radius: 0.5rem;
    margin: 0.25rem 0.75rem;
    transition: all 0.25s ease;
    font-weight: 500;
  }

  .nav-link:hover {
    background-color: #e9ecef;
    color: #0d6efd;
    transform: translateX(4px);
  }

  .nav-link.active {
    background: linear-gradient(90deg, #0d6efd 0%, #0b5ed7 100%);
    color: white !important;
    box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
    transform: translateX(4px);
  }

  .nav-link i {
    width: 24px;
    text-align: center;
  }

  .nav-link.logout:hover {
    background-color: #f8d7da;
    color: #dc3545 !important;
  }

  /* Mobile adjustments */
  @media (max-width: 991px) {
    .sidebar {
      min-height: auto;
      border-right: none;
      border-bottom: 1px solid #e9ecef;
    }
    .nav-link {
      margin: 0.2rem 0.5rem;
    }
  }
</style>

<script>
  // JavaScript to toggle sidebar
  const toggleBtn = document.getElementById('sidebar-toggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const toggleIcon = document.getElementById('toggle-icon');

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    toggleIcon.classList.toggle('bi-list');
    toggleIcon.classList.toggle('bi-x-lg');
  });

  // Close when clicking overlay
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    toggleIcon.classList.add('bi-list');
    toggleIcon.classList.remove('bi-x-lg');
  });

  // Optional: close sidebar after clicking sign-out
  document.getElementById('sidebarSignOut')?.addEventListener('click', (e) => {
    e.preventDefault();
    // Your sign-out code here...
    sidebar.classList.remove('open');
    toggleIcon.classList.add('bi-list');
    toggleIcon.classList.remove('bi-x-lg');
  });
</script>
