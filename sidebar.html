<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sidebar</title>

  <!-- Bootstrap Icons (already using bi- classes) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* ==========================================
       SIDEBAR SLIDE + RESPONSIVE STYLES
    ========================================== */

    :root {
      --sidebar-width: 250px;
      --transition-speed: 0.3s;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: #ffffff;
      border-right: 1px solid #e9ecef;
      box-shadow: 2px 0 10px rgba(0,0,0,0.03);
      transition: transform var(--transition-speed) ease;
      z-index: 1000;
      overflow-y: auto;
    }

    /* Hidden by default on mobile */
    @media (max-width: 991.98px) {
      .sidebar {
        transform: translateX(-100%);
      }
    }

    /* Visible on desktop */
    @media (min-width: 992px) {
      .sidebar {
        transform: translateX(0) !important;
      }
    }

    /* When checkbox is checked → show sidebar */
    #sidebar-toggle:checked ~ .sidebar {
      transform: translateX(0);
    }

    /* Overlay (mobile only) */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-speed) ease;
    }

    #sidebar-toggle:checked ~ .overlay {
      opacity: 1;
      pointer-events: auto;
    }

    /* Hamburger button */
    .hamburger {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 1100;
      width: 44px;
      height: 44px;
      background: #0d6efd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: left var(--transition-speed) ease;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: white;
      border-radius: 2px;
      transition: all 0.3s;
    }

    .hamburger span:nth-child(2) {
      margin: 5px 0;
    }

    /* X icon when open */
    #sidebar-toggle:checked ~ .hamburger span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
    }

    #sidebar-toggle:checked ~ .hamburger span:nth-child(2) {
      opacity: 0;
    }

    #sidebar-toggle:checked ~ .hamburger span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* Hide hamburger on desktop */
    @media (min-width: 992px) {
      .hamburger {
        display: none;
      }
    }

    /* Your original sidebar content styles */
    .user-info {
      border-bottom: 1px solid #e9ecef;
    }

    .nav-link {
      color: #495057;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      margin: 0.25rem 0.75rem;
      transition: all 0.25s ease;
      font-weight: 500;
    }

    .nav-link:hover {
      background-color: #e9ecef;
      color: #0d6efd;
      transform: translateX(4px);
    }

    .nav-link.logout:hover {
      background-color: #f8d7da;
      color: #dc3545 !important;
    }

    .nav-link i {
      width: 24px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Toggle input (hidden) -->
<input type="checkbox" id="sidebar-toggle" class="d-none">

<!-- Hamburger menu button -->
<label for="sidebar-toggle" class="hamburger">
  <span></span>
  <span></span>
  <span></span>
</label>

<!-- Overlay (closes sidebar when clicked on mobile) -->
<label for="sidebar-toggle" class="overlay"></label>

<!-- Sidebar -->

      <li class="nav-item">

<!-- Optional: main content area (for testing) -->
