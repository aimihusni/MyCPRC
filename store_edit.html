<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kemaskini Lokasi Penyimpanan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Main CSS -->
    <link href="assets/css/main.css" rel="stylesheet">

    <style>
    .mds-card{
        border:1px solid #dee2e6;
        border-radius:12px;
        overflow:hidden;
        margin-bottom:1rem;
        box-shadow:0 .125rem .25rem rgba(0,0,0,.075);
    }

    .mds-card .card-header{
        background:#0d6efd;
        color:#fff;
        font-weight:600;
        padding:.75rem 1rem;
    }

    .mds-card .card-body{
        background:#fff;
        padding:1rem;
    }

    .form-check{
        margin-bottom:.5rem;
    }

    .form-label{
        font-weight:600;
    }

    .badge-soft{
        background:#e9ecef;
        color:#495057;
        font-weight:500;
    }

    .section-title{
        font-size:1.1rem;
        font-weight:700;
        margin-bottom:1rem;
        padding-bottom:.5rem;
        border-bottom:2px solid #dee2e6;
    }

    textarea{
        resize:vertical;
    }
    </style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder"></aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 px-4 py-4">

    <!-- PAGE HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
        <h4 class="mb-0">Kemaskini Lokasi Penyimpanan</h4>
        <small class="text-muted">
            Kemaskini maklumat lokasi penyimpanan untuk aset EMT seperti warehouse, hospital, atau stor lapangan.
        </small>
        </div>

        <a href="store_all.html" class="btn btn-primary">
        <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>

    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm">

        <div class="card-header bg-white">
        <strong>Maklumat Lokasi Penyimpanan</strong>
        </div>

        <div class="card-body">

        <form>

        <div class="row g-3">

            <!-- NAMA LOKASI -->
            <div class="col-md-6">
            <label class="form-label">Nama Lokasi</label>
            <input type="text" class="form-control"
                    value="Warehouse EMT Sabah"
                    placeholder="Contoh: Warehouse EMT Sabah / Hospital Kuala Lumpur">
            </div>

            <!-- KOD LOKASI -->
            <div class="col-md-3">
            <label class="form-label">Kod Lokasi</label>
            <input type="text" class="form-control"
                    value="LOC-EMT-001">
            </div>

            <!-- NEGERI -->
            <div class="col-md-3">
            <label class="form-label">Negeri</label>
            <select class="form-select">

                <option>Johor</option>
                <option>Kedah</option>
                <option>Kelantan</option>
                <option>Melaka</option>
                <option>Negeri Sembilan</option>
                <option>Pahang</option>
                <option>Perak</option>
                <option>Perlis</option>
                <option>Pulau Pinang</option>

                <option selected>Sabah</option>

                <option>Sarawak</option>
                <option>Selangor</option>
                <option>Terengganu</option>
                <option>WP Kuala Lumpur</option>
                <option>WP Putrajaya</option>

            </select>
            </div>

            <!-- JENIS LOKASI -->
            <div class="col-md-4">
            <label class="form-label">Jenis Lokasi</label>
            <select class="form-select">

                <option>Warehouse Utama</option>
                <option>Stor Hospital</option>

                <option selected>Stor Lapangan (Field Base)</option>

                <option>Unit Logistik</option>
                <option>Lain-lain</option>

            </select>
            </div>

            <!-- KAPASITI -->
            <div class="col-md-4">
            <label class="form-label">Kapasiti Penyimpanan</label>
            <input type="number" class="form-control"
                    value="150"
                    placeholder="Contoh: 100 (unit aset)">
            </div>

            <!-- STATUS -->
            <div class="col-md-4">
            <label class="form-label">Status Lokasi</label>
            <select class="form-select">

                <option selected>Aktif</option>
                <option>Tidak Aktif</option>
                <option>Dalam Penyelenggaraan</option>

            </select>
            </div>

            <!-- ALAMAT -->
            <div class="col-12">
            <label class="form-label">Alamat Lengkap</label>
            <textarea class="form-control" rows="3">Jalan Hospital, Kota Kinabalu, Sabah, Malaysia</textarea>
            </div>

            <!-- CATATAN -->
            <div class="col-12">
            <label class="form-label">Catatan</label>
            <textarea class="form-control" rows="2">Lokasi utama penyimpanan aset EMT Sabah untuk operasi bencana.</textarea>
            </div>

        </div>

        <!-- BUTTON -->
        <div class="d-flex justify-content-end mt-4">

            <button type="submit" class="btn btn-primary px-4 rounded-pill shadow-sm">
            <i class="bi bi-check-circle me-1"></i>
            Kemaskini Lokasi
            </button>

        </div>

        </form>

        </div>

    </div>

    </main>




    
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD HEADER / FOOTER / SIDEBAR -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

fetch("sidebar.html")
  .then(res => res.text())
  .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
