<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kemaskini Maklumat Pengguna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- BODY -->
<div class="container-fluid">
  <div class="row">

    <!-- LEFT PANEL -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder">
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-4">

<!-- ===== TITLE ===== -->
<div class="welcome mb-4">

          <!--BUTTON BACK-->
          <div class="mb-3 d-flex justify-content-end">
            <a href="profile.html" class="btn btn-primary">
              <i class="bi bi-arrow-left me-1"></i> Kembali
            </a>
          </div>

  <!-- TITLE CONTENT -->
  <h2 class="mb-1">Kemaskini Akaun MyCPRC</h2>

  <h6 class="text-muted mb-0">
    Sila pastikan semua maklumat pegawai adalah benar sebelum hantar
  </h6>

</div>

        <!-- FORM REGISTER -->
        <div class="main-cards d-flex justify-content-center">

        <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">

            <div class="card-body text-dark">

            <form>

                <!-- NAMA -->
                <div class="mb-3">
                <label class="text-dark">Nama Pegawai</label>
                <input type="text" class="form-control" name="nama_pegawai" 
                placeholder="Petugas A"
                required>
                </div>

                <!-- JAWATAN -->
                <div class="mb-3">
                <label class="text-dark">Jawatan</label>
                <input type="text" class="form-control" name="jawatan" 
                placeholder="Pegawai Perubatan"
                required>
                </div>

                <!-- PEJABAT -->
                <div class="mb-3">
                <label class="text-dark">Pejabat / Hospital</label>
                <input type="text" class="form-control" name="pejabat" 
                placeholder="Ibu Pejabat KKM"
                required>
                </div>

                <!-- BAHAGIAN -->
                <div class="mb-3">
                <label class="text-dark">Bahagian</label>
                <input type="text" class="form-control" name="bahagian" 
                placeholder="Bahagian Kawalan Penyakit"
                required>
                </div>

                <!-- SEKTOR -->
                <div class="mb-3">
                <label class="text-dark">Sektor</label>
                <input type="text" class="form-control" name="sektor" 
                placeholder="Sektor Kawalan Penyakit Berjangkit"
                required>
                </div>

                <!-- UNIT -->
                <div class="mb-3">
                <label class="text-dark">Unit</label>
                <input type="text" class="form-control" name="unit" 
                placeholder="Unit Informasi & Dokumentasi"
                required>
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                <label class="text-dark">Email</label>
                <input type="email" class="form-control" name="email" 
                placeholder="user@email.com"
                required>
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                <label class="text-dark">Password</label>

                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" placeholder="password" required>

                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">
                    <i class="bi bi-eye"></i>
                    </button>
                </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-3">
                <label class="text-dark">Confirm Password</label>

                <div class="input-group">
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="password" required>

                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password')">
                    <i class="bi bi-eye"></i>
                    </button>
                </div>
                </div>

                <!-- REGISTER BUTTON -->
                <button type="submit" class="btn btn-primary w-100 mb-2">
                Kemaskini Akaun
                </button>

            </form>

            </div>

        </div>

        </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Load Header & Footer -->
<script>
  fetch("header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

<!-- Load Sidebar -->
<script>
  fetch("sidebar.html")
    .then(res => res.text())
    .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

<!-- PASSWORD TAK NAMPAK-->
<script>
function togglePassword(id) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }
}
</script>

</body>
</html>
