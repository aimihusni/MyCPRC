<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- BODY -->
<div class="container-fluid">
  <div class="row">

    <!-- LEFT PANEL -->
    <aside class="col-md-3 col-lg-2 sidebar p-0" id="sidebar-placeholder">
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-4">

      <!-- ===== TITLE ===== -->
      <div class="welcome mb-4">
        <h2>Pendaftaran Akaun MyCPRC</h2>
        <h6>Daftar maklumat pegawai MyCPRC</h6>
      </div>

        <!-- FORM REGISTER -->
        <div class="main-cards d-flex justify-content-center">

        <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">

            <div class="card-body text-dark">

            <form>

                <!-- NAMA -->
                <div class="mb-3">
                <label class="text-dark">Nama Pegawai</label>
                <input type="text" class="form-control" name="nama_pegawai" required>
                </div>

                <!-- JAWATAN -->
                <div class="mb-3">
                <label class="text-dark">Jawatan</label>
                <input type="text" class="form-control" name="jawatan" required>
                </div>

                <!-- PEJABAT -->
                <div class="mb-3">
                <label class="text-dark">Pejabat / Hospital</label>
                <input type="text" class="form-control" name="pejabat" required>
                </div>

                <!-- BAHAGIAN -->
                <div class="mb-3">
                <label class="text-dark">Bahagian</label>
                <input type="text" class="form-control" name="bahagian" required>
                </div>

                <!-- SEKTOR -->
                <div class="mb-3">
                <label class="text-dark">Sektor</label>
                <input type="text" class="form-control" name="sektor" required>
                </div>

                <!-- UNIT -->
                <div class="mb-3">
                <label class="text-dark">Unit</label>
                <input type="text" class="form-control" name="unit" required>
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                <label class="text-dark">Email</label>
                <input type="email" class="form-control" name="email" required>
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                <label class="text-dark">Password</label>
                <input type="password" class="form-control" name="password" required>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-3">
                <label class="text-dark">Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" required>
                </div>

                <!-- REGISTER BUTTON -->
                <button type="submit" class="btn btn-primary w-100 mb-2">
                Daftar Akaun
                </button>

                <!-- LOGIN BUTTON -->
                <a href="user_login.html" class="btn btn-outline-secondary w-100">
                Login (Sudah Ada Akaun)
                </a>

            </form>

            </div>

        </div>

        </div>

    </main>
  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Load Header & Footer -->
<script>
  fetch("header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

<!-- Load Sidebar -->
<script>
  fetch("sidebar.html")
    .then(res => res.text())
    .then(data => document.getElementById("sidebar-placeholder").innerHTML = data);
</script>

</body>
</html>
